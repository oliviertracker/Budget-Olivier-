<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mon Budget Interactif</title>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #f0f2f5; padding: 20px; margin: 0; }
        .container { max-width: 500px; margin: 0 auto; }
        h1 { text-align: center; color: #1976d2; font-size: 1.5rem; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 8px 16px rgba(0,0,0,0.1); }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background-color: #1976d2; color: white; }
        .header-pot { background-color: #e3f2fd; font-weight: bold; color: #1565c0; font-size: 0.9rem; }
        input { width: 80px; padding: 8px; border: 1px solid #ccc; border-radius: 6px; text-align: right; font-size: 1rem; color: #333; }
        input:focus { border-color: #1976d2; outline: none; background-color: #fffde7; }
        .total-row { background-color: #f8f9fa; font-weight: bold; }
        .resultat-final { background-color: #1976d2; color: white; font-weight: bold; font-size: 1.1rem; }
        .revenu-row { background-color: #e8f5e9; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Mon Budget Olivier</h1>
        <table>
            <thead><tr><th>Détail</th><th>Montant (€)</th></tr></thead>
            <tbody>
                <tr class="revenu-row"><td>TOTAL REVENUS</td><td><input type="number" id="rev" value="1800" oninput="calculer()"></td></tr>
                
                <tr class="header-pot"><td colspan="2">POT 1 : SÉCURITÉ</td></tr>
                <tr><td>Épargne précaution</td><td><input type="number" class="pot1" value="225" oninput="calculer()"></td></tr>
                
                <tr class="header-pot"><td colspan="2">POT 2 : CHARGES FIXES</td></tr>
                <tr><td>Loyer / Essence</td><td><input type="number" class="pot2" value="450" oninput="calculer()"></td></tr>
                <tr><td>Factures / Assur.</td><td><input type="number" class="pot2" value="273" oninput="calculer()"></td></tr>
                <tr><td>Abonnements</td><td><input type="number" class="pot2" value="91" oninput="calculer()"></td></tr>
                
                <tr class="header-pot"><td colspan="2">POT 3 : INVESTISSEMENTS</td></tr>
                <tr><td>Assur. Vie / Vacances</td><td><input type="number" class="pot3" value="200" oninput="calculer()"></td></tr>
                <tr><td>Crypto / ETF</td><td><input type="number" class="pot3" value="175" oninput="calculer()"></td></tr>
                
                <tr class="header-pot" style="background-color: #fff3e0;"><td>POT 4 : COURANT</td><td id="res-pot4" style="text-align: right; padding-right: 25px; font-weight: bold; color: #e65100;">0</td></tr>
                
                <tr class="resultat-final"><td>RESTE À VIVRE</td><td id="total-reste" style="text-align: right; padding-right: 25px;">0</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        function calculer() {
            let revenus = parseFloat(document.getElementById('rev').value) || 0;
            let p1 = Array.from(document.getElementsByClassName('pot1')).reduce((a, b) => a + (parseFloat(b.value) || 0), 0);
            let p2 = Array.from(document.getElementsByClassName('pot2')).reduce((a, b) => a + (parseFloat(b.value) || 0), 0);
            let p3 = Array.from(document.getElementsByClassName('pot3')).reduce((a, b) => a + (parseFloat(b.value) || 0), 0);
            
            let reste = revenus - p1 - p2 - p3;
            
            document.getElementById('res-pot4').innerText = reste.toFixed(2) + " €";
            document.getElementById('total-reste').innerText = reste.toFixed(2) + " €";

            // Sauvegarde automatique
            const inputs = document.querySelectorAll('input');
            const data = {};
            inputs.forEach((input, index) => data[index] = input.value);
            localStorage.setItem('budgetData', JSON.stringify(data));
        }

        // Charger les données sauvegardées
        window.onload = function() {
            const savedData = JSON.parse(localStorage.getItem('budgetData'));
            if (savedData) {
                const inputs = document.querySelectorAll('input');
                inputs.forEach((input, index) => {
                    if (savedData[index]) input.value = savedData[index];
                });
            }
            calculer();
        }
    </script>
</body>
</html>
